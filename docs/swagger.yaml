openapi: 3.0.0
info:
  title: FixNearby API Documentation
  description: API endpoints specification for local service discovery, booking, and workers.
  version: 1.0.0
paths:
  /api/auth/login:
    post:
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful Authentication
  /api/workers/profile:
    get:
      summary: Get Worker Profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successful profile retrieval
  /api/issues/nearby:
    get:
      summary: Get Nearby Issues
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
        - name: longitude
          in: query
          required: true
          schema:
            type: number
      responses:
        '200':
          description: List of nearby issues returned successfully
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT