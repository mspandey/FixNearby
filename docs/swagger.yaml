openapi: 3.0.0
info:
  title: FixNearby API Documentation
  description: API endpoints specification for local service discovery, booking, and workers.
  version: 1.0.0
paths:
  /api/auth/login:
    post:
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful Authentication